name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Lint
        run: bunx biome check .

      - name: Bump version & publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Determine version bump based on commit message
          LATEST_COMMIT=$(git log -1 --pretty=%B)
          if echo "$LATEST_COMMIT" | grep -q "^major:"; then
            npm version major --no-git-tag-version
          elif echo "$LATEST_COMMIT" | grep -q "^minor:"; then
            npm version minor --no-git-tag-version
          else
            npm version patch --no-git-tag-version
          fi

          npm publish
          rm .npmrc

          # Commit the version bump back
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --tags
